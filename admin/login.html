<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel Admin IP-RBV</title>
    <link rel="icon" href="../assets/icon-512.webp" type="image/webp">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a2463, #061a42); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-logo { text-align: center; margin-bottom: 30px; }
        .login-logo img { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 10px; }
        .login-logo h1 { font-size: 1.2rem; color: #0a2463; margin-bottom: 5px; }
        .login-logo p { color: #6c757d; font-size: 0.85rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #0a2463; box-shadow: 0 0 0 3px rgba(10,36,99,0.1); }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #0a2463, #061a42); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(10,36,99,0.4); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg { background: #fee; color: #c41e3a; padding: 10px 15px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 15px; display: none; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #6c757d; text-decoration: none; font-size: 0.85rem; }
        .back-link a:hover { color: #0a2463; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="../assets/icon-512.webp" alt="IP-RBV">
            <h1>Panel de Administración</h1>
            <p>IP República Bolivariana de Venezuela</p>
        </div>
        
        <div class="error-msg" id="error-msg"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" required placeholder="admin@iprbv.edu.cu">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login" id="btn-login">Iniciar Sesión</button>
        </form>
        
        <div class="back-link">
            <a href="../">← Volver al sitio web</a>
        </div>
    </div>

    <script src="../config.js"></script>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const config = window.SUPABASE_CONFIG;
        const supabase = createClient(config.url, config.key);

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const btnLogin = document.getElementById('btn-login');

        // Check if already logged in
        const loggedUser = localStorage.getItem('iprbv_admin');
        if (loggedUser) {
            window.location.href = '/admin/';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            btnLogin.disabled = true;
            btnLogin.textContent = 'Ingresando...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', email)
                    .eq('password_hash', password)
                    .single();

                if (error || !data) {
                    throw new Error('Correo o contraseña incorrectos');
                }

                if (data.rol !== 'admin') {
                    throw new Error('No tienes permisos de administrador');
                }

                localStorage.setItem('iprbv_admin', JSON.stringify({
                    id: data.id,
                    email: data.email,
                    nombre: data.nombre,
                    rol: data.rol
                }));

                window.location.href = '/admin/';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btnLogin.disabled = false;
                btnLogin.textContent = 'Iniciar Sesión';
            }
        });
    </script>
</body>
</html>
